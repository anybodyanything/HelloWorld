apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helloworld
  template:
    metadata:
      labels:
        app: helloWorld
    spec:
      containers:
        - name: helloworld-container
          image: helloworld:latest
          ports:
            - containerPort: 80