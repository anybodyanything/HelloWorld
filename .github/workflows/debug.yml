name: Debug OIDC and GCP Auth

on:
  workflow_dispatch:
    inputs:
      deploy:
        type: boolean
        default: false
        description: "Run deploy job?"

jobs:
  debug-oidc-token:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch and decode GitHub OIDC token
        id: fetch_token
        run: |
          echo "Requesting OIDC token..."
          TOKEN_RESPONSE=$(curl -sH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
          echo "Raw token response:"
          echo "$TOKEN_RESPONSE"
          ID_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r .value)
          echo "Decoded token claims:"
          echo "$ID_TOKEN" | cut -d '.' -f2 | base64 --decode | jq .
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
        shell: bash

  deploy:
    if: ${{ inputs.deploy == 'true' }}
    needs: debug-oidc-token
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate in GCP via OIDC
        id: gcp_auth
        uses: google-github-actions/auth@v3
        with:
          project_id: 'steel-totality-328221'
          workload_identity_provider: "projects/75238950751/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider"
          service_account: "gh-actions-oidc@steel-totality-328221.iam.gserviceaccount.com"

      - name: Confirm authentication
        run: |
          gcloud auth list
          gcloud config list
