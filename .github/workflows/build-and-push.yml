name: Package and push image
run-name: Build, push - ${{ inputs.push_image }}, deploy - ${{ inputs.deploy }}
on:
  workflow_dispatch:
    inputs:
      push_image:
        type: boolean
        default: false
        description: "Push image to repo?"
      deploy:
        type: boolean
        default: false
        description: "Deploy to k8s?"

jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tagSetup.outputs.tag }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: |
          mvn clean package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: helloWorld
          path: target/*.jar

  Push:
    if: ${{ inputs.push_image == true}}
    runs-on: ubuntu-latest
    needs: Build
    outputs:
      tag: ${{ steps.tag_setup.outputs.tag }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set image tag
        id: tag_setup
        run: |
          branch=${GITHUB_REF##*/}
          short_sha=${GITHUB_SHA::5}
          if [branch = main]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=$branch-${short_sha}" >> $GITHUB_OUTPUT
          fi

      - name: Login GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Download .jar
        uses: actions/download-artifact@v4
        with:
          name: helloWorld
          path: target

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner}}/helloworld-${{ steps.tag_setup.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker image push ghcr.io/${{ github.repository_owner}}/helloworld-${{ steps.tag_setup.outputs.tag }}

  Deploy:
    if: ${{ inputs.deploy == true }}
    runs-on: ubuntu-latest
    ## needs: Push
    steps:
      - name: Authenticate in gcloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/75238950751/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "gh-actions-oidc@75238950751.iam.gserviceaccount.com"

